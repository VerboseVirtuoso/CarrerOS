name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Server Dependencies
        run: cd server && npm install

      - name: Install Client Dependencies
        run: cd client && npm install

      - name: Build Client
        run: cd client && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Note: Actual deployment to Vercel/Render usually happens via their 
      # native GitHub integrations. This workflow serves as a CI check.
      - name: CI Success
        run: echo "Code built successfully. Ready for auto-deploy."
