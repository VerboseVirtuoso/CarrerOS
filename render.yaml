services:
  - type: web
    name: careeros-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set MONGODB_URI and JWT_SECRET in Render Dashboard > Environment
      # Do NOT commit real credentials to this file
